name: Security CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: security-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-check:
    name: Build & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Install & build shared
        working-directory: shared
        run: |
          npm ci
          npm run build

      - name: Server checks
        working-directory: server
        run: |
          npm ci
          npm run db:generate
          npm run lint
          npm run format:check
          npm run build

      - name: Client checks
        working-directory: client
        run: |
          npm ci
          npm run lint
          npm run build

  dependency-audit:
    name: Dependency audit
    needs: build-and-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Audit shared
        working-directory: shared
        run: |
          npm ci
          npm audit --audit-level=critical

      - name: Audit server
        working-directory: server
        run: |
          npm ci
          npm audit --audit-level=critical

      - name: Audit client
        working-directory: client
        run: |
          npm ci
          npm audit --audit-level=critical

  sonar:
    name: SonarCloud SAST
    needs: build-and-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  snyk-deps:
    name: Snyk dependencies
    needs: build-and-check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [server, client]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            server/package-lock.json
            client/package-lock.json

      - name: Prepare workspace
        run: |
          cd shared && npm ci && npm run build
          cd ../${{ matrix.package }} && npm ci

      - name: Run Snyk
        working-directory: ${{ matrix.package }}
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  container-scan:
    name: Container scan (Trivy)
    needs: build-and-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cybertactics-server:ci -f server/Dockerfile .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cybertactics-server:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
