services:
  postgres:
    image: postgres:16-alpine
    container_name: cybertactics-postgres
    environment:
      POSTGRES_USER: cybertactics
      POSTGRES_PASSWORD: cybertactics_password
      POSTGRES_DB: cybertactics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybertactics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

