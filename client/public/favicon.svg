<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#00ff85;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="radialGrad" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d9ff;stop-opacity:0.8" />
    </radialGradient>
    <filter id="brightGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#radialGrad)" opacity="0.25"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="#0a0e27"/>

  <rect x="4" y="4" width="56" height="56" rx="10" fill="none" stroke="url(#grad)" stroke-width="4" opacity="1"/>
  <rect x="6" y="6" width="52" height="52" rx="9" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.5"/>

  <text x="32" y="50" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="url(#grad)" text-anchor="middle" filter="url(#strongGlow)" opacity="1" stroke="#00ffff" stroke-width="0.5">C</text>

  <text x="32" y="50" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#00ffff" text-anchor="middle" opacity="0.4">C</text>

  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#grad)" stroke-width="2.5" opacity="0.8" stroke-dasharray="4 2">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="12s" repeatCount="indefinite"/>
  </circle>

  <circle cx="32" cy="32" r="28" fill="none" stroke="#00ffff" stroke-width="2" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="32" cy="32" r="24" fill="none" stroke="#00ff85" stroke-width="1" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="20" cy="20" r="2" fill="#00ffff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="44" r="2" fill="#00ff85" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
